<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Subsitech</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/auth.css">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo">
                <i data-lucide="shield-check"></i>
                Subsitech
            </a>
            <h2>Forgot Password?</h2>
            <p>Enter your email and we'll send you a reset link.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div style="padding: 12px 14px; border-radius: 10px; margin-bottom: 10px; background: {{ '#ecfdf3' if category == 'success' else '#fef2f2' }}; color: {{ '#166534' if category == 'success' else '#991b1b' }}; border: 1px solid {{ '#bbf7d0' if category == 'success' else '#fecaca' }};">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form id="forgot-form" action="{{ url_for('forgot_password') }}" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@email.com" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            <a href="login-student.html" class="text-link" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i data-lucide="arrow-left" style="width: 16px;"></i>
                Back to Login
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
